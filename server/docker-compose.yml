services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bananalytics
      POSTGRES_PASSWORD: bananalytics
      POSTGRES_DB: bananalytics
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bananalytics"]
      interval: 5s
      timeout: 5s
      retries: 5

  bananalytics:
    build: .
    # No public ports — Caddy handles external traffic
    expose:
      - "8080"
    environment:
      BANANA_PORT: "8080"
      BANANA_DB_DSN: "postgres://bananalytics:bananalytics@postgres:5432/bananalytics?sslmode=disable"
      BANANA_LOG_LEVEL: "info"
      BANANA_RATE_LIMIT_RPM: "1000"
      BANANA_CORS_ORIGINS: "${BANANA_CORS_ORIGINS:-*}"
      BANANA_DB_MAX_CONNS: "25"
      BANANA_DB_MIN_CONNS: "5"
      # GeoIP database path inside the container.
      # The ./geoip directory is mounted below — run scripts/download-geoip.sh
      # to populate it. If the file doesn't exist, GeoIP is silently disabled.
      BANANA_GEOIP_DB: "/app/geoip/GeoLite2-City.mmdb"
    volumes:
      # Mount the geoip directory read-only. If empty, GeoIP is disabled gracefully.
      - ./geoip:/app/geoip:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      BANANA_DOMAIN: "${BANANA_DOMAIN:-localhost}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - bananalytics
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
