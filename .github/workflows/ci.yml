name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Go Backend ──────────────────────────────────
  go-test:
    name: Go Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: bananalytics
          POSTGRES_PASSWORD: bananalytics
          POSTGRES_DB: bananalytics_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bananalytics"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Download dependencies
        working-directory: server
        run: go mod download

      - name: Build
        working-directory: server
        run: go build ./...

      - name: Run tests
        working-directory: server
        run: go test ./... -v -race -count=1

      - name: Run vet
        working-directory: server
        run: go vet ./...

  # ── TypeScript SDK ──────────────────────────────
  sdk-test:
    name: SDK Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/react-native/package-lock.json

      - name: Install dependencies
        working-directory: packages/react-native
        run: npm ci

      - name: Type check
        working-directory: packages/react-native
        run: npx tsc --noEmit

      - name: Run tests with coverage
        working-directory: packages/react-native
        run: npx jest --coverage --forceExit

      - name: Build
        working-directory: packages/react-native
        run: npm run build

  # ── Docker ──────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [go-test]

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        working-directory: server
        run: docker build -t bananalytics-server:test .
